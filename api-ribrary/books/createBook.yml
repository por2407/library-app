info:
  name: createBook
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/books/
  body:
    type: json
    data: |-
      {
        "title": "Design Patterns",
        "isbn": "978-0201633610",
        "description": "หนังสือ Gang of Four รวม pattern การออกแบบซอฟต์แวร์ที่ใช้งานได้จริง",
        "coverUrl": "https://example.com/images/design-patterns.jpg",
        "totalCopies": 4,
        "availableCopies": 4
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
